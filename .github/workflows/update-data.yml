name: Update Trading Data

on:
  repository_dispatch:
    types: [order-filled]
  schedule:
    - cron: '10 21 * * *'  # 1:10 PM PST (UTC-8)
  workflow_dispatch:        # Allows manual triggering from the GitHub UI

jobs:
  update-data:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # unnecessarily with swap to GetIBKROrders
      #- name: Wait for QC to settle
      #  if: github.event_name == 'repository_dispatch' && github.event.action == 'order-filled'
      #  shell: pwsh
      #  run: |
      #    Write-Host "Order-fill trigger detected, waiting 10 minutes for QC to settle..."
      #    Start-Sleep -Seconds 600
          
      - name: Run GetIBKROrders script
        env:
          IBKR_TOKEN:    ${{ secrets.IBKR_TOKEN }}
          IBKR_QUERY_ID: ${{ secrets.IBKR_QUERY_ID }}
        shell: pwsh
        run: ./scripts/GetIBKROrders.ps1 -MergeData "data.csv"

      - name: Commit and push updated data.csv
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --staged --quiet || git commit -m "Auto-update data.csv [$(Get-Date -Format 'yyyy-MM-dd HH:mm')]"
          git push
