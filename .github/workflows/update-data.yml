name: Update QC Orders

on:
  repository_dispatch:
    types: [order-filled]
  schedule:
    - cron: '10 21 * * *'  # 1:10 PM PST (UTC-8)
  workflow_dispatch:        # Allows manual triggering from the GitHub UI

jobs:
  update-data:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for QC to settle
        if: github.event_name == 'repository_dispatch' && github.event.action == 'order-filled'
        shell: pwsh
        run: |
          Write-Host "Order-fill trigger detected, waiting 5 minutes for QC to settle..."
          Start-Sleep -Seconds 300
          
      - name: Run GetQCOrders script
        env:
          USER_ID:    ${{ secrets.USER_ID }}
          API_TOKEN:  ${{ secrets.API_TOKEN }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        shell: pwsh
        run: ./scripts/GetQCOrders.ps1 -MergeData "data.csv"

      - name: Commit and push updated data.csv
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --staged --quiet || git commit -m "Auto-update data.csv [$(Get-Date -Format 'yyyy-MM-dd HH:mm')]"
          git push
