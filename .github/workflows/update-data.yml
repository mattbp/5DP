name: Update Trading Data
on:
  repository_dispatch:
    types: [order-filled]
  schedule:
    - cron: '10 21 * * *'  # 1:10 PM PST (UTC-8)
  workflow_dispatch:        # Allows manual triggering from the GitHub UI
jobs:
  update-data:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Wait for Order to appear
        if: github.event_name == 'repository_dispatch' && github.event.action == 'order-filled'
        shell: pwsh
        run: |
          Write-Host "Order-fill trigger detected, waiting 10 minutes for Order to appear ..."
          Start-Sleep -Seconds 600
          
      - name: Run GetIBKROrders script
        env:
          IBKR_TOKEN:    ${{ secrets.IBKR_TOKEN }}
          IBKR_QUERY_ID: ${{ secrets.IBKR_QUERY_ID }}
        shell: pwsh
        run: ./scripts/GetIBKROrders.ps1 -MergeData "data.csv"

      - name: Update SPY data
        shell: pwsh
        run: |
          ./scripts/GetMarketData.ps1 -Ticker "SPY" -OutputPath "spy.csv" -ApiKey "${{ secrets.ALPHA_VANTAGE_KEY }}"
      
      - name: Commit and push updated data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv spy.csv
          git diff --staged --quiet || git commit -m "Auto-update data [$(Get-Date -Format 'yyyy-MM-dd HH:mm')]"
          git push
