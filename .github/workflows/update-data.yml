name: Update QC Orders

on:
  schedule:
    - cron: '0 18-21 * * *'  # Every hour, 10AM-1PM PST (UTC-8)
  workflow_dispatch:        # Allows manual triggering from the GitHub UI

jobs:
  update-data:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run GetQCOrders script
        env:
          USER_ID:    ${{ secrets.USER_ID }}
          API_TOKEN:  ${{ secrets.API_TOKEN }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        shell: pwsh
        run: ./scripts/GetQCOrders.ps1 -MergeData "data.csv"

      - name: Commit and push updated data.csv
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --staged --quiet || git commit -m "Auto-update data.csv [$(Get-Date -Format 'yyyy-MM-dd HH:mm')]"
          git push
