<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automated Premium Selling Algorithm Results</title>
<!-- Google tag (gtag.js) --><script async src="https://www.googletagmanager.com/gtag/js?id=G-8HKEKVB8PM"></script><script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-8HKEKVB8PM');</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a18; padding: 24px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #1a1a18; }
  .loading { font-size: 13px; color: #888780; padding: 40px 0; text-align: center; }
  .error   { font-size: 13px; color: #791f1f; padding: 40px 0; text-align: center; }
  .metric-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin-bottom: 20px; }
  .metric { background: #f1efe8; border-radius: 8px; padding: 14px 16px; }
  .metric-label { font-size: 12px; color: #73726c; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 500; color: #1a1a18; }
  .metric-value.info    { color: #185fa5; }
  .metric-value.success { color: #0f6e56; }
  .metric-sub  { font-size: 11px; color: #888780; margin-top: 2px; }
  .legend { display: flex; gap: 20px; font-size: 12px; color: #73726c; margin-bottom: 4px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot  { width: 10px; height: 10px; border-radius: 2px; }
  .chart-wrap  { position: relative; width: 100%; height: 360px; background: #fff; border-radius: 8px; border: 0.5px solid #d3d1c7; padding: 8px; margin-bottom: 8px; }
  .pl-wrap     { position: relative; width: 100%; height: 130px; background: #fff; border-radius: 8px; border: 0.5px solid #d3d1c7; padding: 8px; margin-bottom: 6px; }
  .monthly-wrap{ position: relative; width: 100%; height: 260px; background: #fff; border-radius: 8px; border: 0.5px solid #d3d1c7; padding: 8px; }
  .section-label { font-size: 12px; font-weight: 500; color: #73726c; margin: 20px 0 6px; }
  .dd-table { width: 100%; font-size: 12px; border-collapse: collapse; background: #fff; border-radius: 8px; border: 0.5px solid #d3d1c7; overflow: hidden; }
  .dd-table th { color: #73726c; font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 0.5px solid #d3d1c7; background: #f9f9f7; }
  .dd-table td { padding: 7px 12px; color: #1a1a18; border-bottom: 0.5px solid #d3d1c7; }
  .dd-table tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 500; text-align: center; line-height: 18px; color: #fff; }
  .dd-amt { color: #791f1f; font-weight: 500; }
  .disclaimer { margin-top: 16px; font-size: 11px; color: #888780; line-height: 1.6; border-top: 0.5px solid #d3d1c7; padding-top: 12px; font-style: italic; }
  #dashboard { display: none; }

  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1a; color: #c2c0b6; }
    h1   { color: #e8e6dc; }
    .metric { background: #2c2c2a; }
    .metric-label { color: #9c9a92; }
    .metric-value { color: #e8e6dc; }
    .metric-value.info    { color: #85b7eb; }
    .metric-value.success { color: #5dcaa5; }
    .metric-sub { color: #73726c; }
    .legend { color: #9c9a92; }
    .loading { color: #73726c; }
    .chart-wrap, .pl-wrap, .monthly-wrap { background: #242422; border-color: #444441; }
    .dd-table { background: #242422; border-color: #444441; }
    .dd-table th { background: #2c2c2a; color: #9c9a92; border-color: #444441; }
    .dd-table td { color: #c2c0b6; border-color: #444441; }
    .dd-amt { color: #f09595; }
    .section-label { color: #9c9a92; }
    .disclaimer { color: #73726c; border-color: #444441; }
  }
</style>
</head>
<body>

<h1>Automated Premium Selling Algorithm Results</h1>
<div id="status" class="loading">Loading data...</div>

<div id="dashboard">
  <div class="metric-grid" id="metricGrid"></div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#378ADD;"></span>Account balance</span>
    <span class="legend-item"><span class="legend-dot" style="background:#1D9E75;opacity:0.7;"></span>Win</span>
    <span class="legend-item"><span class="legend-dot" style="background:#E24B4A;opacity:0.7;"></span>Loss</span>
    <span class="legend-item"><span style="display:inline-block;width:18px;height:10px;border-top:2px solid #E24B4A;border-left:2px solid #E24B4A;border-right:2px solid #E24B4A;border-radius:2px 2px 0 0;"></span>Top 3 drawdowns</span>
  </div>

  <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  <div class="pl-wrap"><canvas id="plChart"></canvas></div>

  <div class="section-label">Top 3 drawdown periods</div>
  <table class="dd-table">
    <thead><tr><th></th><th>Peak date</th><th>Trough date</th><th>Recovery date</th><th>Max drawdown</th><th>Duration</th></tr></thead>
    <tbody id="ddBody"></tbody>
  </table>

  <div class="section-label">Monthly P&amp;L breakdown</div>
  <div class="monthly-wrap"><canvas id="monthlyChart"></canvas></div>

  <p class="disclaimer" id="disclaimer"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CSV_URL   = 'https://mattbp.github.io/5DP/data.csv';
const START_BAL = 442428.22;
const RF_DAILY  = 0.04 / 365.25;

function fmt(v) {
  const abs = Math.abs(v).toLocaleString();
  return v < 0 ? `($${abs})` : `$${abs}`;
}

function parseDate(s) {
  if (s.includes('-')) { const [y,m,d]=s.split('-'); return new Date(parseInt(y),parseInt(m)-1,parseInt(d)); }
  const [m,d,y]=s.split('/'); return new Date(parseInt(y),parseInt(m)-1,parseInt(d));
}

function toDisplayDate(s) {
  const dt = parseDate(s);
  return `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`;
}

async function loadCSV() {
  const resp = await fetch(CSV_URL + '?t=' + Date.now());
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

  const lastModified = resp.headers.get('Last-Modified');
  let dataAsOf = 'unknown';
  if (lastModified) {
    dataAsOf = new Date(lastModified).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
    });
  }

  const text = await resp.text();
  const rawPL = text.trim().split('\n').slice(1)
    .filter(r => r.trim())
    .map(row => {
      const [date, pl] = row.split(',');
      return [toDisplayDate(date.trim().replace(/"/g,'')), parseFloat(pl.trim().replace(/"/g,''))];
    });

  return { rawPL, dataAsOf };
}

function buildDashboard(rawPL, dataAsOf) {
  let bal = START_BAL;
  const raw = rawPL.map(([d,pl]) => { bal=Math.round((bal+pl)*100)/100; return {d,pl,bal,w:pl>=0}; });

  const dailyInterest = raw.map((r,i) => {
    if (i===0) return 0;
    const gap=(parseDate(r.d)-parseDate(raw[i-1].d))/86400000;
    return raw[i-1].bal*RF_DAILY*gap;
  });
  let cumInt=0;
  const adjBals = raw.map((r,i) => { cumInt+=dailyInterest[i]; return Math.round((r.bal+cumInt)*100)/100; });

  const n=raw.length, wins=raw.filter(r=>r.w).length, losses=n-wins;
  const winRate=(wins/n*100).toFixed(1);
  const netPremium=Math.round(raw.reduce((s,r)=>s+r.pl,0));
  const netInterest=Math.round(dailyInterest.reduce((s,v)=>s+v,0));
  const years=(parseDate(raw[n-1].d)-parseDate(raw[0].d))/(365.25*86400000);
  const cagrTotal   =((adjBals[n-1]/START_BAL)**(1/years)-1)*100;
  const cagrPremium =(((START_BAL+netPremium)/START_BAL)**(1/years)-1)*100;
  const cagrInterest=(((START_BAL+netInterest)/START_BAL)**(1/years)-1)*100;
  const pctR=raw.map(r=>r.pl/START_BAL), meanR=pctR.reduce((s,v)=>s+v,0)/n;
  const stdR=Math.sqrt(pctR.reduce((s,v)=>s+(v-meanR)**2,0)/(n-1));
  const sharpe=((meanR-0.04/252)/stdR*Math.sqrt(252)).toFixed(2);

  const grossWins = raw.reduce((s,r)=>r.pl>0?s+r.pl:s, 0);
  const grossLoss = raw.reduce((s,r)=>r.pl<0?s+Math.abs(r.pl):s, 0);
  const profitFactor = (grossWins/grossLoss).toFixed(2);

  let peak=adjBals[0], maxDD=0, maxDDpct=0;
  for(let i=1;i<n;i++){
    if(adjBals[i]>peak) peak=adjBals[i];
    const dd=peak-adjBals[i];
    if(dd>maxDD){ maxDD=dd; maxDDpct=dd/peak*100; }
  }

  document.getElementById('metricGrid').innerHTML=`
    <div class="metric">
      <div class="metric-label">CAGR</div>
      <div class="metric-value info">${cagrTotal.toFixed(2)}%</div>
      <div class="metric-sub">Net option premium: $${netPremium.toLocaleString()} (${cagrPremium.toFixed(2)}%)</div>
      <div class="metric-sub">Net interest: $${netInterest.toLocaleString()} (${cagrInterest.toFixed(2)}%)</div>
    </div>
    <div class="metric">
      <div class="metric-label">Win rate</div>
      <div class="metric-value success">${winRate}%</div>
      <div class="metric-sub">${wins}W / ${losses}L</div>
    </div>
    <div class="metric">
      <div class="metric-label">Sharpe ratio</div>
      <div class="metric-value success">${sharpe}</div>
      <div class="metric-sub">vs 4.0% risk-free</div>
    </div>
    <div class="metric">
      <div class="metric-label">Profit factor</div>
      <div class="metric-value success">${profitFactor}</div>
      <div class="metric-sub">$${Math.round(grossWins).toLocaleString()} wins / $${Math.round(grossLoss).toLocaleString()} losses</div>
    </div>
    <div class="metric">
      <div class="metric-label">Max drawdown</div>
      <div class="metric-value" style="color:#a32d2d;">($${Math.round(maxDD).toLocaleString()})</div>
      <div class="metric-sub">${maxDDpct.toFixed(1)}% from peak</div>
    </div>`;

  document.getElementById('disclaimer').textContent =
    `Underlying portfolio invested 100% at the 4% risk free rate. Above data is as of ${dataAsOf}.`;

  let runPeak=adjBals[0],runPeakIdx=0,ddPeriods=[],inDD=false,peakIdx=0,troughIdx=0,troughVal=Infinity;
  for(let i=0;i<n;i++){
    if(adjBals[i]>=runPeak){runPeak=adjBals[i];runPeakIdx=i;}
    if(adjBals[i]<runPeak){
      if(!inDD){inDD=true;peakIdx=runPeakIdx;troughIdx=i;troughVal=adjBals[i];}
      else if(adjBals[i]<troughVal){troughVal=adjBals[i];troughIdx=i;}
    } else if(inDD){
      ddPeriods.push({peakIdx,troughIdx,recoveryIdx:i,amount:Math.round(adjBals[peakIdx]-troughVal),days:Math.round((parseDate(raw[i].d)-parseDate(raw[peakIdx].d))/86400000)});
      inDD=false;troughVal=Infinity;
    }
  }
  if(inDD) ddPeriods.push({peakIdx,troughIdx,recoveryIdx:n-1,amount:Math.round(adjBals[peakIdx]-troughVal),days:Math.round((parseDate(raw[n-1].d)-parseDate(raw[peakIdx].d))/86400000)});
  ddPeriods.sort((a,b)=>b.amount-a.amount);
  const top3=ddPeriods.slice(0,3);

  const fmtDate=s=>parseDate(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const ddOp=['0.9','0.6','0.4'];
  document.getElementById('ddBody').innerHTML=top3.map((dd,i)=>`
    <tr>
      <td><span class="badge" style="background:rgba(226,75,74,${ddOp[i]});">${i+1}</span></td>
      <td>${fmtDate(raw[dd.peakIdx].d)}</td><td>${fmtDate(raw[dd.troughIdx].d)}</td><td>${fmtDate(raw[dd.recoveryIdx].d)}</td>
      <td class="dd-amt">-$${dd.amount.toLocaleString()} (-${(dd.amount/adjBals[dd.peakIdx]*100).toFixed(1)}%)</td>
      <td>${dd.days} days</td>
    </tr>`).join('');

  const labels=raw.map(r=>r.d);
  const dark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const textColor=dark?'#9c9a92':'#73726c';
  const ddStyles=[{stroke:'rgba(226,75,74,1)',lw:2},{stroke:'rgba(226,75,74,0.65)',lw:1.5},{stroke:'rgba(226,75,74,0.45)',lw:1.2}];

  const drawdownPlugin={id:'drawdownBrackets',afterDraw(chart){
    const{ctx,chartArea,scales}=chart; if(!chartArea) return;
    top3.forEach((dd,ri)=>{
      const x1=scales.x.getPixelForValue(dd.peakIdx),x2=scales.x.getPixelForValue(dd.recoveryIdx);
      const baseY=scales.y.getPixelForValue(adjBals[dd.peakIdx]),topY=baseY-12;
      const s=ddStyles[ri];
      ctx.save(); ctx.strokeStyle=s.stroke; ctx.lineWidth=s.lw; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(x1,baseY); ctx.lineTo(x1,topY); ctx.lineTo(x2,topY); ctx.lineTo(x2,baseY); ctx.stroke();
      ctx.fillStyle=s.stroke; ctx.font='400 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('-$'+dd.amount.toLocaleString()+' (-'+(dd.amount/adjBals[dd.peakIdx]*100).toFixed(1)+'%)  '+dd.days+'d',(x1+x2)/2,topY-4);
      ctx.restore();
    });
  }};

  new Chart(document.getElementById('mainChart').getContext('2d'),{
    data:{labels,datasets:[{type:'line',label:'Account balance',data:adjBals,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.08)',fill:true,borderWidth:2,pointRadius:0,pointHoverRadius:4,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:24}},interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:dark?'#2c2c2a':'#fff',borderColor:dark?'#444441':'#d3d1c7',borderWidth:1,titleColor:textColor,bodyColor:dark?'#c2c0b6':'#3d3d3a',padding:10,callbacks:{label:ctx=>{const i=ctx.dataIndex;return[` Balance: $${Math.round(ctx.parsed.y).toLocaleString()}`,` Net option premium: ${fmt(raw[i].pl)}`];}}}},
      scales:{x:{ticks:{color:textColor,font:{size:11},maxTicksLimit:8,maxRotation:0},grid:{color:gridColor}},y:{ticks:{color:textColor,font:{size:11},callback:v=>'$'+(v/1000).toFixed(0)+'k'},grid:{color:gridColor}}}
    },plugins:[drawdownPlugin]
  });

  new Chart(document.getElementById('plChart').getContext('2d'),{
    data:{labels,datasets:[{type:'bar',label:'Daily P&L',data:raw.map(r=>r.pl),backgroundColor:raw.map(r=>r.w?'rgba(29,158,117,0.7)':'rgba(226,75,74,0.7)'),borderRadius:2,barPercentage:0.8}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:dark?'#2c2c2a':'#fff',borderColor:dark?'#444441':'#d3d1c7',borderWidth:1,titleColor:textColor,bodyColor:dark?'#c2c0b6':'#3d3d3a',padding:8,callbacks:{label:ctx=>{const v=ctx.parsed.y;return ' '+(v>=0?'+':'')+' $'+Math.abs(v).toLocaleString();}}}},
      scales:{x:{ticks:{display:false},grid:{color:gridColor}},y:{ticks:{color:textColor,font:{size:10},callback:v=>(v>=0?'+':'')+' $'+(v/1000).toFixed(1)+'k'},grid:{color:gridColor}}}}
  });

  const allMonths=[...new Set(raw.map(r=>{const dt=parseDate(r.d);return`${dt.getMonth()+1}/${dt.getFullYear()}`;}))];
  const filteredMonths=allMonths.filter(m=>{const[mo,yr]=m.split('/');return!(mo==='8'&&yr==='2025');});
  const monthLabels=filteredMonths.map(m=>{const[mo,yr]=m.split('/');return new Date(parseInt(yr),parseInt(mo)-1,1).toLocaleDateString('en-US',{month:'short',year:'2-digit'});});
  const mData={};
  filteredMonths.forEach(m=>mData[m]={pls:[],wins:0,losses:0,interest:0});
  raw.forEach((r,i)=>{const dt=parseDate(r.d),key=`${dt.getMonth()+1}/${dt.getFullYear()}`;if(!mData[key])return;mData[key].pls.push(r.pl);mData[key].interest+=dailyInterest[i];r.w?mData[key].wins++:mData[key].losses++;});
  const mPremium=filteredMonths.map(k=>Math.round(mData[k].pls.reduce((a,b)=>a+b,0)));
  const mInterest=filteredMonths.map(k=>Math.round(mData[k].interest));
  const mTotals=filteredMonths.map((_,i)=>mPremium[i]+mInterest[i]);
  const mWR=filteredMonths.map(k=>{const d=mData[k];return Math.round(d.wins/(d.wins+d.losses)*100);});
  const mBest=filteredMonths.map(k=>Math.round(Math.max(...mData[k].pls)));
  const mWorst=filteredMonths.map(k=>Math.round(Math.min(...mData[k].pls)));
  const mAvg=filteredMonths.map(k=>Math.round(mData[k].pls.reduce((a,b)=>a+b,0)/mData[k].pls.length));
  const mColors=mTotals.map(v=>v>=0?'rgba(29,158,117,0.75)':'rgba(226,75,74,0.75)');

  new Chart(document.getElementById('monthlyChart').getContext('2d'),{
    type:'bar',data:{labels:monthLabels,datasets:[{label:'Monthly P&L',data:mTotals,backgroundColor:mColors,borderRadius:4,barPercentage:0.6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:dark?'#2c2c2a':'#fff',borderColor:dark?'#444441':'#d3d1c7',borderWidth:1,titleColor:textColor,bodyColor:dark?'#c2c0b6':'#3d3d3a',padding:10,
      callbacks:{label:ctx=>{const i=ctx.dataIndex;return[` Option premium: ${fmt(mPremium[i])}`,` Win rate: ${mWR[i]}%`,` Avg day: ${fmt(mAvg[i])}`,` Worst day: ${fmt(mWorst[i])}`,` Best day: ${fmt(mBest[i])}`];}}}},
      scales:{x:{ticks:{color:textColor,font:{size:11}},grid:{color:gridColor}},y:{ticks:{color:textColor,font:{size:11},callback:v=>'$'+(v/1000).toFixed(1)+'k'},grid:{color:gridColor}}}}
  });
}

loadCSV()
  .then(({ rawPL, dataAsOf }) => {
    document.getElementById('status').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    buildDashboard(rawPL, dataAsOf);
  })
  .catch(err => {
    document.getElementById('status').className = 'error';
    document.getElementById('status').textContent = `Failed to load data: ${err.message}. Make sure data.csv is published at ${CSV_URL}`;
  });
</script>
</body>
</html>
