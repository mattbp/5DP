<style>
  :root {
    --bg: #0a0e13;
    --surface: #111820;
    --surface2: #172030;
    --border: #1e2a3a;
    --text: #c8d6e5;
    --text-dim: #5a6f84;
    --text-bright: #e8f0f8;
    --green: #00e396;
    --green-dim: #00e39620;
    --red: #ff6b6b;
    --red-dim: #ff6b6b18;
    --amber: #f0a830;
    --amber-dim: #f0a83020;
    --blue: #4dabf7;
    --blue-dim: #4dabf720;
    --purple: #b197fc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

  /* Header */
  .header {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 32px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Newsreader', serif;
    font-size: 28px; font-weight: 600;
    color: var(--text-bright);
    letter-spacing: -0.5px;
  }
  .header .sub {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 2px;
  }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .stat-card .label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-size: 20px; font-weight: 600;
    color: var(--text-bright);
  }
  .stat-card .value.pos { color: var(--green); }
  .stat-card .value.neg { color: var(--red); }

  /* Two Column Layout */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 20px;
  }
  @media (max-width: 1100px) {
    .content-grid { grid-template-columns: 1fr; }
  }

  /* Trade Table */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .trade-table {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
  }
  .trade-table th {
    text-align: left; padding: 10px 12px;
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    font-weight: 500; position: sticky; top: 0;
    background: var(--surface);
  }
  .trade-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .trade-table tr:hover { background: var(--surface2); }
  .trade-table tr.selected { background: var(--blue-dim); }
  .trade-table tr { cursor: pointer; }
  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }
  .tag-drs {
    background: var(--red-dim); color: var(--red);
    padding: 2px 6px; border-radius: 3px; font-size: 10px;
  }
  .tag-profit {
    background: var(--green-dim); color: var(--green);
    padding: 2px 6px; border-radius: 3px; font-size: 10px;
  }
  .tag-expire {
    background: var(--amber-dim); color: var(--amber);
    padding: 2px 6px; border-radius: 3px; font-size: 10px;
  }
  .tag-escalate {
    background: var(--blue-dim); color: var(--blue);
    padding: 2px 6px; border-radius: 3px; font-size: 10px;
  }
  .table-scroll {
    max-height: 520px; overflow-y: auto;
  }
  .table-scroll::-webkit-scrollbar { width: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: var(--surface); }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Agent Panel */
  .agent-panel {
    display: flex; flex-direction: column;
  }
  .agent-content {
    padding: 16px;
    flex: 1;
    font-family: 'Newsreader', serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    max-height: 560px;
    overflow-y: auto;
  }
  .agent-content::-webkit-scrollbar { width: 6px; }
  .agent-content::-webkit-scrollbar-track { background: var(--surface); }
  .agent-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .agent-content p { margin-bottom: 12px; }
  .agent-content strong { color: var(--text-bright); }
  .agent-content .insight-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--amber);
    margin-bottom: 6px; display: block;
  }
  .agent-content .insight-block {
    background: var(--surface2);
    border-left: 2px solid var(--amber);
    padding: 12px 14px;
    margin-bottom: 16px;
    border-radius: 0 4px 4px 0;
  }

  /* Agent Input */
  .agent-input-row {
    display: flex; gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .agent-input {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
  }
  .agent-input:focus { border-color: var(--blue); }
  .agent-input::placeholder { color: var(--text-dim); }
  .agent-btn {
    background: var(--blue);
    color: var(--bg);
    border: none; border-radius: 4px;
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .agent-btn:hover { opacity: 0.85; }
  .agent-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loading */
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4,end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* Filters */
  .filter-row {
    display: flex; gap: 8px; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active {
    background: var(--blue-dim);
    border-color: var(--blue);
    color: var(--blue);
  }

  /* PnL chart */
  .chart-container {
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }
  .chart-container canvas { width: 100% !important; }
</style>
</head>

        <button class="agent-btn" id="agent-ask" onclick="askAgent()">Ask</button>
      </div>
    </div>
  </div>
</div>

function getApiKey() {

// ─── Parse CSV ───
function parseCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const orders = [];
  for (let i = 1; i < lines.length; i++) {
    // Handle quoted fields
    const match = lines[i].match(/^([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),(".*"|[^,]*)$/);
    if (!match) continue;
    orders.push({
      time: new Date(match[1]),
      symbol: match[2].trim(),
      price: parseFloat(match[3]),
      quantity: parseInt(match[4]),
      type: match[5],
      status: match[6],
      value: parseFloat(match[7]),
      tag: match[8].replace(/"/g, '').trim()
    });
  }
  return orders;
}

// ─── Reconstruct Round-Trip Trades ───
function reconstructTrades(orders) {
  const filled = orders.filter(o => o.status === 'Filled');
  const trades = [];
  const openPositions = {};

  for (const order of filled) {
    const sym = order.symbol;
    const isSell = order.quantity < 0;
    const isBuy = order.quantity > 0;
    const isEntry = order.tag.includes('Entry') || order.tag.includes('Escalate Entry');
    const isExit = order.tag.includes('Profit Stop') || order.tag.includes('StopExit') || order.tag.includes('Option Exercise');

    if (isSell && isEntry) {
      // Opening a short position
      const dte = order.tag.includes('0DTE') ? '0DTE' : order.tag.includes('1DTE') ? '1DTE' : '?';
      const side = order.tag.includes('Put') ? 'Put' : order.tag.includes('Call') ? 'Call' : '?';
      const isEscalate = order.tag.includes('Escalate');
      if (!openPositions[sym]) {
        openPositions[sym] = {
          symbol: sym, dte, side, isEscalate,
          entryTime: order.time,
          entryPrice: order.price,
          entryQty: Math.abs(order.quantity),
          entryValue: Math.abs(order.value),
          legs: [order]
        };
      } else {
        // Additional entry (escalate)
        const pos = openPositions[sym];
        pos.isEscalate = true;
        pos.entryValue += Math.abs(order.value);
        pos.entryQty += Math.abs(order.quantity);
        pos.legs.push(order);
      }
    } else if (isBuy && isExit && openPositions[sym]) {
      const pos = openPositions[sym];
      let exitType = 'profit_stop';
      if (order.tag.includes('Delta Rate StopExit')) exitType = 'drs_stop';
      if (order.tag.includes('Option Exercise')) exitType = 'expired';

      const exitValue = Math.abs(order.value);
      const pnl = pos.entryValue - exitValue;

      // Parse strike from symbol
      const strikeMatch = sym.match(/(\d{5})(\d{3})$/);
      const strike = strikeMatch ? (parseInt(strikeMatch[1] + strikeMatch[2]) / 1000) : 0;

      trades.push({
        date: pos.entryTime,
        exitTime: order.time,
        symbol: sym,
        dte: pos.dte,
        side: pos.side,
        strike: strike,
        entryPrice: pos.entryPrice,
        exitPrice: order.price,
        qty: pos.entryQty,
        credit: pos.entryValue,
        debit: exitValue,
        pnl: pnl,
        exitType: exitType,
        isEscalate: pos.isEscalate,
        holdMinutes: (order.time - pos.entryTime) / 60000
      });

      delete openPositions[sym];
    } else if (isBuy && order.type === 'Option Exercise') {
      // Expired worthless (exercise at 0)
      if (openPositions[sym]) {
        const pos = openPositions[sym];
        const strikeMatch = sym.match(/(\d{5})(\d{3})$/);
        const strike = strikeMatch ? (parseInt(strikeMatch[1] + strikeMatch[2]) / 1000) : 0;
        trades.push({
          date: pos.entryTime,
          exitTime: order.time,
          symbol: sym,
          dte: pos.dte,
          side: pos.side,
          strike: strike,
          entryPrice: pos.entryPrice,
          exitPrice: 0,
          qty: pos.entryQty,
          credit: pos.entryValue,
          debit: 0,
          pnl: pos.entryValue,
          exitType: 'expired',
          isEscalate: pos.isEscalate,
          holdMinutes: (order.time - pos.entryTime) / 60000
        });
        delete openPositions[sym];
      }
    }
  }
  return trades.sort((a, b) => a.date - b.date);
}

// ─── Compute Stats ───
function computeStats(trades) {
  const totalPnL = trades.reduce((s, t) => s + t.pnl, 0);
  const winners = trades.filter(t => t.pnl > 0);
  const losers = trades.filter(t => t.pnl <= 0);
  const winRate = (winners.length / trades.length * 100);
  const avgWin = winners.length ? winners.reduce((s, t) => s + t.pnl, 0) / winners.length : 0;
  const avgLoss = losers.length ? losers.reduce((s, t) => s + t.pnl, 0) / losers.length : 0;
  const drsStops = trades.filter(t => t.exitType === 'drs_stop');
  const profitFactor = losers.length ?
    (winners.reduce((s,t) => s + t.pnl, 0) / Math.abs(losers.reduce((s,t) => s + t.pnl, 0))) : Infinity;

  // Cumulative PnL for max drawdown
  let cumPnL = 0, peak = 0, maxDD = 0;
  for (const t of trades) {
    cumPnL += t.pnl;
    if (cumPnL > peak) peak = cumPnL;
    const dd = peak - cumPnL;
    if (dd > maxDD) maxDD = dd;
  }

  // Daily PnL for Sharpe
  const dailyPnL = {};
  trades.forEach(t => {
    const d = t.date.toISOString().slice(0,10);
    dailyPnL[d] = (dailyPnL[d] || 0) + t.pnl;
  });
  const dailyArr = Object.values(dailyPnL);
  const meanDaily = dailyArr.reduce((s,v) => s+v, 0) / dailyArr.length;
  const stdDaily = Math.sqrt(dailyArr.reduce((s,v) => s + (v-meanDaily)**2, 0) / dailyArr.length);
  const sharpe = stdDaily > 0 ? (meanDaily / stdDaily) * Math.sqrt(252) : 0;

  return { totalPnL, winRate, avgWin, avgLoss, trades: trades.length, drsStops: drsStops.length, maxDD, sharpe, profitFactor, winners: winners.length, losers: losers.length };
}

// ─── Render Stats ───
function renderStats(stats) {
  const el = document.getElementById('stats-row');
  const cards = [
    { label: 'Net PnL', value: `$${(stats.totalPnL * 100).toFixed(0)}`, cls: stats.totalPnL >= 0 ? 'pos' : 'neg' },
    { label: 'Win Rate', value: `${stats.winRate.toFixed(1)}%`, cls: stats.winRate >= 50 ? 'pos' : 'neg' },
    { label: 'Trades', value: stats.trades, cls: '' },
    { label: 'Profit Factor', value: stats.profitFactor.toFixed(2), cls: stats.profitFactor >= 1.5 ? 'pos' : '' },
    { label: 'Sharpe', value: stats.sharpe.toFixed(2), cls: stats.sharpe >= 1 ? 'pos' : '' },
    { label: 'Max DD', value: `$${(stats.maxDD * 100).toFixed(0)}`, cls: 'neg' },
    { label: 'DRS Stops', value: stats.drsStops, cls: '' },
    { label: 'Avg W / L', value: `$${(stats.avgWin*100).toFixed(0)} / $${(stats.avgLoss*100).toFixed(0)}`, cls: '' },
  ];
  el.innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls}">${c.value}</div>
    </div>
  `).join('');
}

// ─── Render Trades Table ───
function renderTrades(trades) {
  const tbody = document.getElementById('trade-body');
  document.getElementById('trade-count').textContent = `${trades.length} trades`;
  tbody.innerHTML = trades.map((t, i) => {
    const pnlClass = t.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    const exitTag = t.exitType === 'drs_stop' ? '<span class="tag-drs">DRS</span>' :
                    t.exitType === 'expired' ? '<span class="tag-expire">EXPIRED</span>' :
                    '<span class="tag-profit">PROFIT</span>';
    const escTag = t.isEscalate ? ' <span class="tag-escalate">ESC</span>' : '';
    const dateStr = t.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const pnlDollars = (t.pnl * 100).toFixed(0);
    return `<tr data-idx="${i}" onclick="selectTrade(${i})">
      <td>${dateStr}</td>
      <td>${t.dte} ${t.side}</td>
      <td>${t.strike.toFixed(0)}</td>
      <td>$${t.entryPrice.toFixed(2)}</td>
      <td>$${t.exitPrice.toFixed(2)}</td>
      <td class="${pnlClass}">${t.pnl >= 0 ? '+' : ''}$${pnlDollars}</td>
      <td>${exitTag}${escTag}</td>
    </tr>`;
  }).join('');
}

function applyFilter() {
  let filtered = ALL_TRADES;
  switch (currentFilter) {
    case '0DTE': filtered = ALL_TRADES.filter(t => t.dte === '0DTE'); break;
    case '1DTE': filtered = ALL_TRADES.filter(t => t.dte === '1DTE'); break;
    case 'put': filtered = ALL_TRADES.filter(t => t.side === 'Put'); break;
    case 'call': filtered = ALL_TRADES.filter(t => t.side === 'Call'); break;
    case 'drs': filtered = ALL_TRADES.filter(t => t.exitType === 'drs_stop'); break;
    case 'losers': filtered = ALL_TRADES.filter(t => t.pnl < 0); break;
  }
  renderTrades(filtered);
}

// ─── Agent: Claude API ───
function buildTradeContext() {
  const stats = computeStats(ALL_TRADES);
  const drsStops = ALL_TRADES.filter(t => t.exitType === 'drs_stop');
  const worstTrades = [...ALL_TRADES].sort((a,b) => a.pnl - b.pnl).slice(0, 5);
  const bestTrades = [...ALL_TRADES].sort((a,b) => b.pnl - a.pnl).slice(0, 5);

  // Weekly breakdown
  const weeklyPnL = {};
  ALL_TRADES.forEach(t => {
    const d = t.date;
    const wk = `${d.getFullYear()}-W${String(Math.ceil((d.getDate() + new Date(d.getFullYear(),d.getMonth(),1).getDay()) / 7)).padStart(2,'0')}-${d.toLocaleString('en',{month:'short'})}`;
    weeklyPnL[wk] = (weeklyPnL[wk] || 0) + t.pnl * 100;
  });

  // Time-of-day analysis
  const hourPnL = {};
  ALL_TRADES.forEach(t => {
    const h = t.date.getUTCHours();
    if (!hourPnL[h]) hourPnL[h] = { pnl: 0, count: 0 };
    hourPnL[h].pnl += t.pnl * 100;
    hourPnL[h].count++;
  });

  // Streak analysis
  let streak = 0, maxWinStreak = 0, maxLoseStreak = 0, curStreak = 0;
  ALL_TRADES.forEach(t => {
    if (t.pnl > 0) { curStreak = curStreak > 0 ? curStreak + 1 : 1; }
    else { curStreak = curStreak < 0 ? curStreak - 1 : -1; }
    if (curStreak > maxWinStreak) maxWinStreak = curStreak;
    if (curStreak < maxLoseStreak) maxLoseStreak = curStreak;
  });

  return `You are an expert options trading analyst reviewing backtest results for an SPX 0DTE/1DTE premium-selling algorithm with a Delta Rate Stop (DRS) system.

STRATEGY: Sells short-dated SPX puts and calls, uses profit stops for exits, and a DRS mechanism (window=60 bars, put threshold=0.12, call threshold=0.08) that triggers exits when delta moves too fast.

BACKTEST PERIOD: ${ALL_TRADES[0].date.toLocaleDateString()} to ${ALL_TRADES[ALL_TRADES.length-1].date.toLocaleDateString()}

SUMMARY STATS:
- Total Trades: ${stats.trades} (${stats.winners}W / ${stats.losers}L)
- Net PnL: $${(stats.totalPnL*100).toFixed(0)} (per-contract x100 multiplier applied)
- Win Rate: ${stats.winRate.toFixed(1)}%
- Profit Factor: ${stats.profitFactor.toFixed(2)}
- Sharpe: ${stats.sharpe.toFixed(2)}
- Max Drawdown: $${(stats.maxDD*100).toFixed(0)}
- DRS Stop-Outs: ${stats.drsStops}
- Avg Win: $${(stats.avgWin*100).toFixed(0)} / Avg Loss: $${(stats.avgLoss*100).toFixed(0)}

DRS STOP-OUTS:
${drsStops.map(t => `  ${t.date.toLocaleDateString()} ${t.dte} ${t.side} ${t.strike} — PnL: $${(t.pnl*100).toFixed(0)}, held ${t.holdMinutes.toFixed(0)}min`).join('\n')}

TOP 5 WORST TRADES:
${worstTrades.map(t => `  ${t.date.toLocaleDateString()} ${t.dte} ${t.side} ${t.strike} — PnL: $${(t.pnl*100).toFixed(0)}, exit: ${t.exitType}`).join('\n')}

TOP 5 BEST TRADES:
${bestTrades.map(t => `  ${t.date.toLocaleDateString()} ${t.dte} ${t.side} ${t.strike} — PnL: $${(t.pnl*100).toFixed(0)}, exit: ${t.exitType}`).join('\n')}

HOUR-OF-DAY PNL (UTC):
${Object.entries(hourPnL).sort((a,b)=>a[0]-b[0]).map(([h,v]) => `  ${h}:00 UTC — $${v.pnl.toFixed(0)} across ${v.count} trades`).join('\n')}

WIN/LOSE STREAKS: Best win streak: ${maxWinStreak}, Worst lose streak: ${Math.abs(maxLoseStreak)}

Provide analysis in this exact format, be direct and specific with numbers. Use 2-3 short paragraphs max per section. Focus on actionable observations.`;
}

async function callAgent(userMessage, isInitial = false) {
  const systemPrompt = buildTradeContext();

  if (isInitial) {
    conversationHistory = [
      { role: 'user', content: 'Give me a journal entry analyzing these backtest results. Cover: (1) overall performance assessment, (2) DRS effectiveness — are the stops saving money or causing unnecessary exits, (3) any patterns in the losers (time of day, side bias, etc), (4) one specific actionable insight. Be concise and direct.' }
    ];
  } else {
    conversationHistory.push({ role: 'user', content: userMessage });
  }

  try {
    const key = getApiKey();
    if (!key) {
      return 'No API key provided. The dashboard and trade data work without it — enter a key to enable agent analysis. Get one at console.anthropic.com/settings/keys';
    }

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    if (data.error) {
      if (data.error.type === 'authentication_error') {
        sessionStorage.removeItem('claude_api_key');
        API_KEY = '';
        return 'Invalid API key. Cleared from session — reload and try again. Get a key at console.anthropic.com/settings/keys';
      }
      return `API error: ${data.error.message}`;
    }
    const text = data.content.map(b => b.text || '').join('');
    conversationHistory.push({ role: 'assistant', content: text });
    return text;
  } catch (err) {
    return `Error reaching agent: ${err.message}. The trade data and stats are still fully functional above.`;
  }
}

function renderAgentResponse(text) {
  const el = document.getElementById('agent-content');
  // Convert markdown-style formatting to HTML
  let html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  el.innerHTML = html;
}

async function askAgent() {
  const input = document.getElementById('agent-input');
  const btn = document.getElementById('agent-ask');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  btn.disabled = true;
  const el = document.getElementById('agent-content');
  el.innerHTML += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
    <span class="insight-label">You</span>
    <p style="color:var(--text-bright)">${msg}</p>
    <span class="insight-label" style="margin-top:8px;">Agent</span>
    <p style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:12px;">Thinking<span class="loading-dots"></span></p>
  </div>`;
  el.scrollTop = el.scrollHeight;

  const response = await callAgent(msg);
  // Replace last loading with response
  const divs = el.querySelectorAll('div');
  const last = divs[divs.length - 1];
  const agentP = last.querySelectorAll('p');
  let formatted = response
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  agentP[agentP.length - 1].innerHTML = formatted;
  agentP[agentP.length - 1].style.color = 'var(--text)';
  agentP[agentP.length - 1].style.fontFamily = "'Newsreader', serif";
  agentP[agentP.length - 1].style.fontSize = '15px';

  btn.disabled = false;
  el.scrollTop = el.scrollHeight;
}

function selectTrade(idx) {
  document.querySelectorAll('.trade-table tr').forEach(r => r.classList.remove('selected'));
  const row = document.querySelector(`tr[data-idx="${idx}"]`);
  if (row) row.classList.add('selected');

  // Ask agent about this trade
  const t = ALL_TRADES[idx];
  const input = document.getElementById('agent-input');
  input.value = `Tell me about the ${t.dte} ${t.side} ${t.strike} trade on ${t.date.toLocaleDateString()} — exit was ${t.exitType}, PnL $${(t.pnl*100).toFixed(0)}. What likely happened?`;
  input.focus();
}

// Handle enter key
document.getElementById('agent-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') askAgent();
});

// ─── Init ───
async function init() {
  const csvText = CSV_RAW;

  const orders = parseCSV(csvText);
  ALL_TRADES = reconstructTrades(orders);
  const stats = computeStats(ALL_TRADES);

  renderStats(stats);
  renderTrades(ALL_TRADES);
  renderChart(ALL_TRADES);

  // Fire initial agent analysis
  const analysis = await callAgent('', true);
  renderAgentResponse(analysis);
}

init();
</script>
