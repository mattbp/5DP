<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f14;--surface:#141821;--surface2:#1a1f2b;--surface3:#222838;
  --border:#2a3040;--border-light:#363e52;
  --text:#e4e8f0;--text-dim:#8892a6;--text-faint:#5a6378;
  --accent:#4fa8e0;--accent-glow:rgba(79,168,224,0.15);
  --green:#5cbf7a;--green-bg:rgba(92,191,122,0.1);--green-border:rgba(92,191,122,0.25);
  --orange:#e8a04c;--orange-bg:rgba(232,160,76,0.1);
  --red:#e05c5c;--red-bg:rgba(224,92,92,0.08);
  --phase1:#4fa8e0;--phase2:#e8a04c;--phase3:#e05c5c;
  --radius:10px;--radius-sm:6px;
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.6;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(79,168,224,0.04) 0%,transparent 60%),
                    radial-gradient(ellipse at 80% 100%,rgba(224,92,92,0.03) 0%,transparent 60%);
}
a{color:var(--accent);text-decoration:none;transition:color .2s}
a:hover{color:#7cc0ec}

/* Header */
.header{
  padding:2.5rem 1.5rem 2rem;max-width:900px;margin:0 auto;
  border-bottom:1px solid var(--border);
}
.header-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);font-weight:600;margin-bottom:.75rem;
}
.header-badge svg{width:14px;height:14px}
.header h1{
  font-family:'Instrument Serif',serif;font-size:2.4rem;font-weight:400;
  line-height:1.1;margin-bottom:.5rem;color:#fff;
}
.header h1 .accent{color:var(--accent);font-style:italic}
.header p.sub{color:var(--text-dim);font-size:.9rem;max-width:600px}

/* Progress Bar */
.progress-section{
  max-width:900px;margin:1.5rem auto;padding:0 1.5rem;
}
.progress-bar-outer{
  background:var(--surface);border-radius:20px;height:10px;overflow:hidden;
  border:1px solid var(--border);
}
.progress-bar-inner{
  height:100%;border-radius:20px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--phase1),var(--phase2),var(--phase3));
}
.progress-stats{
  display:flex;justify-content:space-between;margin-top:.5rem;
  font-size:.75rem;color:var(--text-dim);
}

/* Phase Header */
.phase-header{
  max-width:900px;margin:2rem auto .5rem;padding:0 1.5rem;
}
.phase-label{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:'Instrument Serif',serif;font-size:1.5rem;color:#fff;
}
.phase-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.phase-desc{color:var(--text-dim);font-size:.82rem;margin-top:.25rem;max-width:700px}

/* Week Accordion */
.weeks-container{max-width:900px;margin:0 auto;padding:0 1.5rem 3rem}

.week-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden;
  transition:border-color .3s;
}
.week-card:hover{border-color:var(--border-light)}
.week-card.active{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.week-card.completed{border-color:var(--green-border);background:var(--green-bg)}

.week-header{
  display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;
  cursor:pointer;user-select:none;
}
.week-check{
  width:24px;height:24px;border-radius:50%;border:2px solid var(--border-light);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .3s;background:transparent;cursor:pointer;
}
.week-check.done{border-color:var(--green);background:var(--green)}
.week-check.done svg{opacity:1}
.week-check svg{width:14px;height:14px;opacity:0;transition:opacity .2s}

.week-title{flex:1;min-width:0}
.week-date{
  font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--accent);
  letter-spacing:.05em;margin-bottom:2px;
}
.week-title strong{font-size:.95rem;color:#fff;font-weight:600}
.week-title span.desc{display:block;font-size:.75rem;color:var(--text-dim);margin-top:2px}

.week-expand{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);transition:transform .3s,color .3s;flex-shrink:0;
}
.week-card.open .week-expand{transform:rotate(180deg);color:var(--accent)}

/* Week Body */
.week-body{display:none;padding:0 1.25rem 1.25rem}
.week-card.open .week-body{display:block}

/* Day Block */
.day-block{margin-bottom:1.25rem}
.day-label{
  font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-faint);font-weight:600;margin-bottom:.5rem;
  padding-bottom:.35rem;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.day-est{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:.65rem}

/* Exercise Row */
.ex-row{
  display:grid;grid-template-columns:28px 1fr;gap:.5rem;
  padding:.6rem 0;border-bottom:1px solid rgba(42,48,64,0.5);
  align-items:start;
}
.ex-row:last-child{border-bottom:none}

.ex-check{
  width:22px;height:22px;border-radius:var(--radius-sm);
  border:2px solid var(--border-light);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;
  margin-top:2px;background:transparent;flex-shrink:0;
}
.ex-check.done{border-color:var(--green);background:var(--green)}
.ex-check svg{width:12px;height:12px;opacity:0}
.ex-check.done svg{opacity:1}

.ex-content{min-width:0}
.ex-name{font-size:.88rem;font-weight:500;color:var(--text);position:relative;display:inline-block}
.ex-name a{
  color:var(--accent);border-bottom:1px dashed rgba(79,168,224,0.3);
  padding-right:14px;position:relative;
}
.ex-name a::after{
  content:'↗';position:absolute;right:0;top:-2px;
  font-size:.7rem;opacity:.6;
}
.ex-name a:hover{border-bottom-color:var(--accent)}

.ex-prescription{font-size:.78rem;color:var(--text-dim);margin-top:2px}
.ex-prescription .est{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:.72rem}
.ex-ski-note{
  font-size:.72rem;color:var(--orange);margin-top:4px;
  padding:4px 8px;background:var(--orange-bg);border-radius:var(--radius-sm);
  display:inline-block;line-height:1.4;
}

/* Tracking Input */
.ex-tracking{
  display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;
}
.track-input{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:4px 8px;font-size:.75rem;
  color:var(--text);font-family:'JetBrains Mono',monospace;
  width:110px;outline:none;transition:border-color .2s;
}
.track-input:focus{border-color:var(--accent)}
.track-input::placeholder{color:var(--text-faint)}

/* Notes */
.week-notes{margin-top:1rem}
.week-notes textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:.6rem .75rem;font-size:.8rem;
  color:var(--text);font-family:'DM Sans',sans-serif;resize:vertical;
  min-height:60px;outline:none;transition:border-color .2s;
}
.week-notes textarea:focus{border-color:var(--accent)}
.week-notes label{font-size:.72rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:block}

/* Reset */
.reset-section{max-width:900px;margin:0 auto;padding:0 1.5rem 3rem;text-align:center}
.reset-btn{
  background:var(--red-bg);border:1px solid rgba(224,92,92,0.2);
  color:var(--red);padding:.5rem 1.25rem;border-radius:var(--radius-sm);
  font-size:.78rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
}
.reset-btn:hover{background:rgba(224,92,92,0.15);border-color:rgba(224,92,92,0.4)}

/* Current Week Indicator */
.current-badge{
  font-size:.6rem;background:var(--accent);color:#0c0f14;
  padding:2px 6px;border-radius:3px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;margin-left:.5rem;
  vertical-align:middle;
}

@media(max-width:600px){
  .header h1{font-size:1.6rem}
  .week-header{padding:.8rem 1rem}
  .week-body{padding:0 1rem 1rem}
  .track-input{width:90px}
}
</style>
</head>

  if (!q) return '';
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);

// ─── DATE COMPUTATION ───
// Program starts June 1, 2026 (or current year if already past).
const START = new Date(2026, 5, 1); // June 1, 2026 — Month is 0-indexed
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function weekDateRange(weekIdx) {
  const start = new Date(START);
  start.setDate(start.getDate() + weekIdx * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const startStr = `${MONTHS[start.getMonth()]} ${start.getDate()}`;
  const endStr = (start.getMonth() === end.getMonth())
    ? `${end.getDate()}`
    : `${MONTHS[end.getMonth()]} ${end.getDate()}`;
  return `${startStr}–${endStr}`;
}

// ─── STATE MANAGEMENT ───
const STATE_KEY = 'bigdaddy-ski-v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(s) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch {}
}

const keyEx = (w,d,e) => `ex-${w}-${d}-${e}`;
const keyTr = (w,d,e,t) => `tr-${w}-${d}-${e}-${t}`;
const keyWk = (w) => `wk-${w}`;
const keyNotes = (w) => `notes-${w}`;
const keyOpen = () => 'openWeek';

let state = loadState();

function getCurrentWeek() {
  const now = new Date();
  const diff = Math.floor((now - START) / (7 * 24 * 60 * 60 * 1000));
  return Math.max(0, Math.min(23, diff));
}

// ─── RENDER ───
function render() {
  const app = document.getElementById('app');
  const currentWeek = getCurrentWeek();
  let html = '';
  let wIdx = 0;

  PROGRAM.forEach(phase => {
    html += `<div class="phase-header">
      <div class="phase-label"><span class="phase-dot" style="background:${phase.phaseColor}"></span>${phase.phaseTitle}</div>
      <div class="phase-desc">${phase.phaseDesc}</div>
    </div><div class="weeks-container">`;

    phase.weeks.forEach(week => {
      const wi = wIdx;
      const isDone = state[keyWk(wi)];
      const isOpen = state[keyOpen()] === wi || (state[keyOpen()] === undefined && wi === currentWeek);
      const isCurrent = wi === currentWeek;
      const dateRange = weekDateRange(wi);

      html += `<div class="week-card${isOpen?' open':''}${isDone?' completed':''}${isCurrent?' active':''}" data-week="${wi}">
        <div class="week-header" onclick="toggleWeek(${wi})">
          <div class="week-check${isDone?' done':''}" onclick="event.stopPropagation();toggleWeekDone(${wi})">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
          </div>
          <div class="week-title">
            <div class="week-date">${dateRange}</div>
            <strong>Week ${week.week}: ${week.title}</strong>${isCurrent?'<span class="current-badge">current</span>':''}
            <span class="desc">${week.subtitle}</span>
          </div>
          <div class="week-expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M6 9l6 6 6-6"/></svg></div>
        </div>
        <div class="week-body">`;

      week.days.forEach((day, di) => {
        // Compute day total estimated time
        const dayTotal = day.exercises.reduce((sum, ex) => sum + (ex.estMin || 0), 0);
        html += `<div class="day-block">
          <div class="day-label"><span>${day.label}</span><span class="day-est">~ ${dayTotal} min total</span></div>`;

        day.exercises.forEach((row, ei) => {
          const ex = EX[row.k];
          if (!ex) return;
          const done = state[keyEx(wi, di, ei)];
          const linkUrl = searchUrl(ex.q);
          const skiNote = ex.skiNote || '';
          const nameHtml = linkUrl
            ? `<a href="${linkUrl}" target="_blank" rel="noopener">${ex.name}</a>`
            : ex.name;

          const estStr = row.estMin ? ` — Est: ${row.estMin} min` : '';
          const restStr = row.rest ? ` — rest ${row.rest}` : '';

          html += `<div class="ex-row">
            <div class="ex-check${done?' done':''}" onclick="toggleEx(${wi},${di},${ei})">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
            </div>
            <div class="ex-content">
              <div class="ex-name">${nameHtml}</div>
              <div class="ex-prescription">${row.sets}${restStr}<span class="est">${estStr}</span></div>
              ${skiNote ? `<div class="ex-ski-note">⛷ ${skiNote}</div>` : ''}
              <div class="ex-tracking">
                ${row.tracks.map((t, ti) => {
                  const val = state[keyTr(wi, di, ei, ti)] || '';
                  const ph = t==='weight'?'lbs':t==='reps'?'reps':t==='time'?'min:sec':t==='distance'?'miles':t==='height'?'inches':t;
                  return `<input class="track-input" placeholder="${ph}" value="${val}" onchange="saveTrack(${wi},${di},${ei},${ti},this.value)">`;
                }).join('')}
              </div>
            </div>
          </div>`;
        });
        html += `</div>`;
      });

      const notes = state[keyNotes(wi)] || '';
      html += `<div class="week-notes"><label>Week Notes</label>
        <textarea placeholder="How did this week feel? Energy levels, soreness, wins…" onchange="saveNotes(${wi},this.value)">${notes}</textarea>
      </div></div></div>`;
      wIdx++;
    });
    html += `</div>`;
  });

  app.innerHTML = html;
  updateProgress();
}

function toggleWeek(wi) {
  state[keyOpen()] = state[keyOpen()] === wi ? -1 : wi;
  saveState(state);
  render();
  if (state[keyOpen()] === wi) {
    setTimeout(() => {
      const el = document.querySelector(`.week-card[data-week="${wi}"]`);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 50);
  }
}
function toggleWeekDone(wi) {
  state[keyWk(wi)] = !state[keyWk(wi)];
  saveState(state); render();
}
function toggleEx(wi, di, ei) {
  state[keyEx(wi, di, ei)] = !state[keyEx(wi, di, ei)];
  saveState(state); render();
}
function saveTrack(wi, di, ei, ti, val) {
  state[keyTr(wi, di, ei, ti)] = val; saveState(state);
}
function saveNotes(wi, val) {
  state[keyNotes(wi)] = val; saveState(state);
}
function updateProgress() {
  let done = 0;
  for (let i = 0; i < 24; i++) if (state[keyWk(i)]) done++;
  const pct = Math.round((done / 24) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} of 24 weeks completed`;
  document.getElementById('progressPct').textContent = pct + '%';
}
function resetAll() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    localStorage.removeItem(STATE_KEY);
    state = {};
    render();
  }
}
render();
</script>
